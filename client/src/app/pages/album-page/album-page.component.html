@if(album) {
  <div class="row">
    <div class="col-12 col-sm-6">
      <h1>{{ album.name }}</h1>
      <img id="albumImg" [src]="album.imageURL">
      <app-thermometer [popularity]="album.popularity"></app-thermometer>
      @for(artist of album.artists; track artist.id) {
        <p>Artist: <a [routerLink]="['/artist', artist.id]">{{ artist.name }}</a></p>
      }
      <p>
        <a class="btn btn-light" role="button" [href]="album.url" target="_blank">Open {{ album.name }} on Spotify</a>
      </p>
    </div>
    <div class="col-12 col-sm-6">
      <h3>Album Tracks</h3>
      <app-track-list [tracks]="tracks" [hideArtist]="true" [hideAlbum]="true"></app-track-list>
    </div>
  </div>
}

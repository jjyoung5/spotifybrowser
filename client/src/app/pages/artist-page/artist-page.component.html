@if(artist) {
  <div class="row">
    <div class="col-xl-4 col-12">
      <h1>{{ artist.name }}</h1>
      <img id="artistImg" [src]="artist.imageURL">
      <p>
        <a class="btn btn-light" role="button" [href]="artist.url" target="_blank">Open {{ artist.name }} on Spotify</a>
      </p>
    </div>
    <div class="col-xl-4 col-12">
      <h3>Popularity</h3>
      <p>{{ artist.followersStr }} followers</p>
      <app-thermometer [popularity]="artist.popularity"></app-thermometer>
      <h3>{{ artist.name }}'s Albums</h3>
      <app-carousel [resources]="albums" carouselId="artist-albums-carousel"></app-carousel>
    </div>
    <div class="col-xl-4 col-12">
      <h3>{{ artist.name }}'s Top Tracks</h3>
      <app-track-list [tracks]="topTracks" [hideArtist]="false" [hideAlbum]="false"></app-track-list>
    </div>
  </div>
}
